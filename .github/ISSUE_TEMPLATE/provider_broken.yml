name: Broken provider
about: Report a CloudStream provider that is not working correctly
title: "[Provider Broken]: "
labels: ["provider-broken", "needs-triage"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a broken provider.

        Please fill this form with clear evidence. Incomplete reports may be hard to reproduce.

  - type: input
    id: provider_name
    attributes:
      label: Provider name
      description: Write the exact provider/module name.
      placeholder: Example: Samehadaku, Anichin, Rebahin
    validations:
      required: true

  - type: input
    id: content_url
    attributes:
      label: Problematic URL
      description: Paste the source/detail/episode URL that fails, if available.
      placeholder: https://example.com/title/example-episode
    validations:
      required: false

  - type: dropdown
    id: issue_area
    attributes:
      label: Broken area
      description: Which part is broken?
      multiple: true
      options:
        - Homepage / main page
        - Category / genre
        - Search
        - Detail / load
        - Episode list
        - Movie play item
        - Playback / loadLinks
        - Subtitle
        - Build / compile
        - Other
    validations:
      required: true

  - type: textarea
    id: behavior
    attributes:
      label: What happened?
      description: Explain the actual behavior and expected behavior.
      placeholder: |
        Actual:
        Expected:
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Write clear steps to reproduce the problem inside CloudStream.
      placeholder: |
        1. Open CloudStream
        2. Select provider ...
        3. Open ...
        4. Tap episode/play
        5. Error appears / no links found
    validations:
      required: true

  - type: dropdown
    id: cloudstream_channel
    attributes:
      label: CloudStream channel
      options:
        - Stable
        - Prerelease
        - Beta / custom build
        - Unknown
    validations:
      required: true

  - type: input
    id: cloudstream_version
    attributes:
      label: CloudStream version
      placeholder: Example: 4.x.x / prerelease build date / unknown
    validations:
      required: false

  - type: dropdown
    id: device_type
    attributes:
      label: Device type
      options:
        - Android phone
        - Android tablet
        - Android TV
        - Emulator
        - Other
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or error message
      description: Paste logcat/error text if available. Remove private data before posting.
      render: text
      placeholder: |
        Paste logs here.
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recording
      description: Drag and drop screenshots/videos here if helpful.
      placeholder: Attach media here.
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Basic checks
      options:
        - label: I checked that the source website is reachable in a browser.
          required: false
        - label: I checked whether the problem happens on the latest repository/plugin build available to me.
          required: false
        - label: I included enough information for the maintainer to reproduce the issue.
          required: true
        - label: I understand that playback fixes require evidence from the source/player flow, not only an error message.
          required: true

  - type: textarea
    id: extra_notes
    attributes:
      label: Additional context
      description: Add mirror domains, VPN/region notes, Cloudflare behavior, or anything else that may help.
      placeholder: Any extra context.
    validations:
      required: false
