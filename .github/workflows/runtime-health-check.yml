name: Runtime Provider Health Check

on:
  workflow_dispatch:
    inputs:
      config:
        description: "Runtime health check config path"
        required: false
        default: "healthcheck/runtime-providers.sample.json"
  schedule:
    - cron: "0 4 * * 1"

permissions:
  contents: read

jobs:
  runtime-health:
    name: Check runtime samples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve config path
        id: config
        run: |
          CONFIG_PATH="${{ github.event.inputs.config }}"
          if [ -z "$CONFIG_PATH" ]; then
            CONFIG_PATH="healthcheck/runtime-providers.sample.json"
          fi
          echo "path=$CONFIG_PATH" >> "$GITHUB_OUTPUT"

      - name: Check player pages
        run: |
          python scripts/health_check_player_pages.py \
            --config "${{ steps.config.outputs.path }}" \
            --json-output runtime-player-report.json \
            --markdown-output runtime-player-report.md

      - name: Check media candidates
        run: |
          python scripts/health_check_media_candidates.py \
            --config "${{ steps.config.outputs.path }}" \
            --json-output runtime-media-report.json \
            --markdown-output runtime-media-report.md

      - name: Check request headers
        run: |
          python scripts/health_check_headers.py \
            --config "${{ steps.config.outputs.path }}" \
            --json-output runtime-headers-report.json \
            --markdown-output runtime-headers-report.md

      - name: Upload runtime health reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runtime-provider-health-report
          path: |
            runtime-player-report.json
            runtime-player-report.md
            runtime-media-report.json
            runtime-media-report.md
            runtime-headers-report.json
            runtime-headers-report.md
