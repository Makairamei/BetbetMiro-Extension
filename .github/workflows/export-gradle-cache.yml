name: Export Gradle Cache

on:
workflow_dispatch:

permissions:
contents: read

jobs:
export-gradle-cache:
runs-on: ubuntu-latest

steps:
  - name: Checkout source
    uses: actions/checkout@v4

  - name: Set up Java
    uses: actions/setup-java@v4
    with:
      distribution: temurin
      java-version: 17

  - name: Make Gradle executable
    run: chmod +x ./gradlew

  - name: Download Cloudstream classes jar
    run: |
      mkdir -p "$HOME/.gradle/caches/cloudstream/cloudstream"
      curl -L \
        -o "$HOME/.gradle/caches/cloudstream/cloudstream/cloudstream.jar" \
        "https://github.com/recloudstream/cloudstream/releases/download/pre-release/classes.jar"
      ls -lah "$HOME/.gradle/caches/cloudstream/cloudstream"

  - name: Populate Gradle cache
    run: |
      ./gradlew tasks --no-daemon || true
      ./gradlew :NoDrakorID:compileDebugKotlin --no-daemon || true

  - name: Pack Gradle cache
    shell: bash
    run: |
      mkdir -p gradle-cache-export

      paths=()

      [ -d "$HOME/.gradle/caches/modules-2" ] && paths+=(".gradle/caches/modules-2")
      [ -d "$HOME/.gradle/caches/jars-9" ] && paths+=(".gradle/caches/jars-9")
      [ -d "$HOME/.gradle/caches/transforms-4" ] && paths+=(".gradle/caches/transforms-4")
      [ -d "$HOME/.gradle/caches/cloudstream" ] && paths+=(".gradle/caches/cloudstream")
      [ -d "$HOME/.gradle/wrapper/dists" ] && paths+=(".gradle/wrapper/dists")

      tar -czf gradle-cache-export/gradle-local-cache.tar.gz \
        -C "$HOME" \
        "${paths[@]}"

      ls -lah gradle-cache-export

  - name: Upload Gradle cache artifact
    uses: actions/upload-artifact@v4
    with:
      name: gradle-local-cache
      path: gradle-cache-export/gradle-local-cache.tar.gz
      retention-days: 3