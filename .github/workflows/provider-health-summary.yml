name: Provider Health Summary

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * 1"

permissions:
  contents: read

jobs:
  provider-health-summary:
    name: Build provider health summary
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Build provider inventory
        run: |
          python scripts/provider_inventory.py \
            --json-output provider-inventory.json \
            --markdown-output provider-inventory.md

      - name: Build provider health summary
        run: |
          python scripts/provider_health_summary.py \
            --inventory provider-inventory.json \
            --json-output provider-health-summary.json \
            --markdown-output provider-health-summary.md

      - name: Upload provider health summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: provider-health-summary
          path: |
            provider-inventory.json
            provider-inventory.md
            provider-health-summary.json
            provider-health-summary.md
